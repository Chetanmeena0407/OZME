<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height: 100vh;
  background: #0b1020;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

/* Container */
.container {
  max-width: 400px;
}

/* Title */
h1 {
  font-size: 38px;
  font-weight: 600;
  background: linear-gradient(90deg, #7c6cff, #9f8cff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: fadeUp 1s ease forwards;
}

/* Subtitle */
p {
  margin-top: 10px;
  color: #9ca3af;
  font-size: 15px;
  animation: fadeUp 1.5s ease forwards;
}

/* Loader dots */
.loader {
  margin-top: 30px;
  display: flex;
  justify-content: center;
  gap: 8px;
}

.loader span {
  width: 10px;
  height: 10px;
  background: #7c6cff;
  border-radius: 50%;
  animation: bounce 1s infinite;
}

.loader span:nth-child(2) {
  animation-delay: 0.2s;
}

.loader span:nth-child(3) {
  animation-delay: 0.4s;
}

/* Animations */
@keyframes bounce {
  0%, 80%, 100% {
    transform: scale(0);
    opacity: 0.5;
  }
  40% {
    transform: scale(1);
    opacity: 1;
  }
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>Coming Soon 🚀</h1>
  <p>This content will be available soon. Stay tuned!</p>

  <div class="loader">
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

</body>
</html>
