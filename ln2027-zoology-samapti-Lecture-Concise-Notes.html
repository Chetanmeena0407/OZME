<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecture Concise Notes</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background-color: #0d0d0d;
      color: white;
    }

    h2 {
      text-align: center;
      margin: 30px 0;
    }

    a { text-decoration: none; color: inherit; }

    .tabs {
      display: flex;
      justify-content: center;
      background-color: #111;
      border-bottom: 1px solid #222;
      flex-wrap: wrap;
    }

    .tab {
      padding: 12px 30px;
      color: #aaa;
      cursor: pointer;
      border-bottom: 3px solid transparent;
    }

    .tab.active {
      color: white;
      border-color: #7a5af8;
    }

    .content-container {
      padding: 25px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      max-width: 1300px;
      margin: auto;
    }

    .card {
      background-color: #1b1b1b;
      border-radius: 10px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 15px rgba(122,90,248,0.4);
    }

    .thumbnail {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 12px;
      object-fit: cover;
    }

    .card h3 {
      font-size: 14px;
      margin-bottom: 15px;
      flex-grow: 1;
    }

    .btn {
      padding: 10px;
      text-align: center;
      border-radius: 6px;
      font-size: 13px;
      color: white;
    }

    .lec-btn { background: #7a5af8; }
    .notes-btn { background: #3a9efd; }
    .dpp-btn { background: #00c896; }

    .tab-content { display: none; }
    .tab-content.active { display: grid; }
  </style>
</head>

<body>

<script>
(function () {
  const verifiedAt = localStorage.getItem("verifiedAt");
  const now = Date.now();

  if (!verifiedAt || (now - parseInt(verifiedAt)) > 86400000) {
    // Prevent infinite redirect
    if (!window.location.pathname.includes("verify.html")) {
      const currentPage = encodeURIComponent(window.location.pathname.split("/").pop());
      window.location.href = "verify.html?redirect=" + currentPage;
    }
  }
})();
</script>

<h2>Lecture Concise Notes</h2>

<div class="tabs">
  <div class="tab active" data-target="lectures">Lectures</div>
  <div class="tab" data-target="notes">Notes</div>
  <div class="tab" data-target="dpp">DPP</div>
</div>

<!-- LECTURES -->
<div class="content-container tab-content active" id="lectures">
  <div class="card">
    <img src="https://via.placeholder.com/300x170" class="thumbnail">
    <h3>Human Reproduction Lecture 01</h3>
    <a href="#" class="btn lec-btn" target="_blank">
      <i class="fa-solid fa-play"></i> Watch Lecture
    </a>
  </div>
</div>

<!-- NOTES -->
<div class="content-container tab-content" id="notes">
  <div class="card">
    <h3>Human Reproduction 01 : Concise Notes</h3>
    <a href="https://static.pw.live/5eb393ee95fab7468a79d189/ADMIN/b0139e7d-242e-4303-866e-265acc8f409c.pdf"
       class="btn notes-btn" target="_blank">
      <i class="fa-solid fa-file-lines"></i> View Notes
    </a>
  </div>
</div>

<!-- DPP -->
<div class="content-container tab-content" id="dpp">
  <div class="card">
    <h3>Human Reproduction DPP 01</h3>
    <a href="#" class="btn dpp-btn" target="_blank">
      <i class="fa-solid fa-book"></i> Practice Sheet
    </a>
  </div>
</div>

<script>
  const tabs = document.querySelectorAll(".tab");
  const contents = document.querySelectorAll(".tab-content");

  tabs.forEach(tab => {
    tab.onclick = () => {
      tabs.forEach(t => t.classList.remove("active"));
      contents.forEach(c => c.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById(tab.dataset.target).classList.add("active");
    };
  });
</script>

</body>
</html>
