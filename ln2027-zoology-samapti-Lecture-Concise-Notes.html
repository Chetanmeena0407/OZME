<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concise Notes</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background-color: #0d0d0d;
      color: white;
    }

    h2 {
      text-align: center;
      margin: 30px 0;
    }

    .content-container {
      padding: 25px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      max-width: 1300px;
      margin: auto;
    }

    .card {
      background-color: #1b1b1b;
      border-radius: 10px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 15px rgba(122,90,248,0.4);
    }

    .card h3 {
      font-size: 14px;
      margin-bottom: 15px;
    }

    .btn {
      padding: 10px;
      text-align: center;
      border-radius: 6px;
      font-size: 13px;
      color: white;
      background: #3a9efd;
    }
  </style>
</head>

<body>

<script>
(function () {
  const verifiedAt = localStorage.getItem("verifiedAt");
  const now = Date.now();

  if (!verifiedAt || (now - parseInt(verifiedAt)) > 86400000) {
    // Prevent infinite redirect
    if (!window.location.pathname.includes("verify.html")) {
      const currentPage = encodeURIComponent(window.location.pathname.split("/").pop());
      window.location.href = "verify.html?redirect=" + currentPage;
    }
  }
})();
</script>

<h2>Concise Notes</h2>

       class="btn" target="_blank">
      <i class="fa-solid fa-file-lines"></i> View Notes
    </a>
  </div>

</div>

</body>
</html>
